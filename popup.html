<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navegação Consciente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* === LIQUID GLASS SYSTEM === */
      --c-glass: #9ca3af;
      --c-light: #fff;
      --c-dark: #1a1a2e;

      --c-bg: #f0f1f3;
      --c-content: #1a1a2e;
      --c-content-soft: #64748b;
      --c-action: #6366f1;
      --c-action-hover: #4f46e5;

      --c-success: #10b981;
      --c-danger: #f43f5e;
      --c-warning: #f59e0b;

      --glass-reflex-dark: 1;
      --glass-reflex-light: 1;
      --saturation: 120%;

      --font-main: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;

      --transition-smooth: 400ms cubic-bezier(1, 0.0, 0.4, 1);
      --transition-bounce: 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Dark Theme */
    body.dark {
      --c-glass: #6b7280;
      --c-light: #fff;
      --c-dark: #000;

      --c-bg: #0f0f12;
      --c-content: #f1f5f9;
      --c-content-soft: #94a3b8;
      --c-action: #818cf8;
      --c-action-hover: #a5b4fc;

      --glass-reflex-dark: 2.5;
      --glass-reflex-light: 0.25;
      --saturation: 150%;
    }

    /* Dim Theme */
    body.dim {
      --c-glass: hsl(260 30% 60% / 1);
      --c-light: #c7d2fe;
      --c-dark: #1e1b4b;

      --c-bg: #1e1b4b;
      --c-content: #e0e7ff;
      --c-content-soft: #a5b4fc;
      --c-action: #f472b6;
      --c-action-hover: #f9a8d4;

      --glass-reflex-dark: 2;
      --glass-reflex-light: 0.6;
      --saturation: 180%;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      font-family: var(--font-main);
      font-size: 14px;
      line-height: 1.5;
      font-optical-sizing: auto;
      background: var(--c-bg);
      color: var(--c-content);
      transition: background var(--transition-smooth), color var(--transition-smooth);
      overflow-x: hidden;
    }

    .container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* === LIQUID GLASS CARD === */
    .glass-card {
      background-color: color-mix(in srgb, var(--c-glass) 15%, transparent);
      backdrop-filter: blur(12px) saturate(var(--saturation));
      -webkit-backdrop-filter: blur(12px) saturate(var(--saturation));
      border-radius: 20px;
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 12%), transparent),
        inset 1.5px 2px 0px -1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 80%), transparent),
        inset -1.5px -1.5px 0px -1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 60%), transparent),
        inset -2px -6px 2px -5px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 40%), transparent),
        inset -0.5px -1px 3px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent),
        inset -1px 2px 3px -1px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 12%), transparent),
        inset 0px 2px 3px -1px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 15%), transparent),
        0px 2px 8px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 6%), transparent),
        0px 8px 24px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 5%), transparent);
      transition:
        background-color var(--transition-smooth),
        box-shadow var(--transition-smooth);
    }

    /* === HEADER === */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--c-action) 0%, color-mix(in srgb, var(--c-action) 80%, var(--c-danger)) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, var(--c-light) 30%, transparent),
        0 4px 12px color-mix(in srgb, var(--c-action) 40%, transparent);
    }

    .header-icon svg {
      width: 18px;
      height: 18px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--c-content);
      white-space: nowrap;
    }

    .header-text p {
      font-size: 11px;
      color: var(--c-content-soft);
      font-weight: 500;
    }

    /* === THEME SWITCHER === */
    .theme-switcher {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 4px;
      background-color: color-mix(in srgb, var(--c-glass) 20%, transparent);
      border-radius: 99px;
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 8%), transparent),
        inset 0 1px 2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent);
    }

    .theme-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 99px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 200ms ease;
      color: var(--c-content-soft);
    }

    .theme-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      transition: transform 200ms ease;
    }

    .theme-btn:hover {
      color: var(--c-action);
    }

    .theme-btn:hover svg {
      transform: scale(1.15);
    }

    .theme-btn.active {
      background-color: color-mix(in srgb, var(--c-glass) 40%, transparent);
      color: var(--c-content);
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 12%), transparent),
        inset 1px 1px 0 color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 60%), transparent),
        inset -1px -1px 0 color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 40%), transparent),
        0 2px 4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
    }

    /* === BUTTONS === */
    .btn {
      width: 100%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: var(--font-main);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all var(--transition-bounce);
      position: relative;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2.5;
      fill: none;
    }

    /* === CONFIG SECTION === */
    .config-section {
      padding: 14px 16px;
    }

    .config-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--c-content-soft);
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .config-label svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* === TIMER GRID === */
    .timer-grid {
      display: flex;
      gap: 6px;
    }

    .timer-btn {
      flex: 1;
      padding: 10px 0;
      background-color: color-mix(in srgb, var(--c-glass) 12%, transparent);
      border: none;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--c-content-soft);
      cursor: pointer;
      font-family: var(--font-main);
      transition: all 200ms ease;
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 6%), transparent),
        inset 0 1px 0 color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 30%), transparent);
    }

    .timer-btn:hover {
      color: var(--c-content);
      background-color: color-mix(in srgb, var(--c-glass) 20%, transparent);
      transform: translateY(-1px);
    }

    .timer-btn.active {
      color: white;
      background: linear-gradient(135deg, var(--c-warning) 0%, color-mix(in srgb, var(--c-warning) 90%, var(--c-danger)) 100%);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, var(--c-light) 30%, transparent),
        0 4px 12px color-mix(in srgb, var(--c-warning) 40%, transparent);
    }

    /* === ALERT TIMER BUTTONS === */
    .alert-btn {
      flex: 1;
      padding: 10px 0;
      background-color: color-mix(in srgb, var(--c-glass) 12%, transparent);
      border: none;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--c-content-soft);
      cursor: pointer;
      font-family: var(--font-main);
      transition: all 200ms ease;
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 6%), transparent),
        inset 0 1px 0 color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 30%), transparent);
    }

    .alert-btn:hover {
      color: var(--c-content);
      background-color: color-mix(in srgb, var(--c-glass) 20%, transparent);
      transform: translateY(-1px);
    }

    .alert-btn.active {
      color: white;
      background: linear-gradient(135deg, var(--c-danger) 0%, color-mix(in srgb, var(--c-danger) 80%, #dc2626) 100%);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, var(--c-light) 30%, transparent),
        0 4px 12px color-mix(in srgb, var(--c-danger) 40%, transparent);
    }

    /* === INPUT GROUP === */
    .input-group {
      display: flex;
      gap: 8px;
    }

    .input-field {
      flex: 1;
      background-color: color-mix(in srgb, var(--c-glass) 12%, transparent);
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      font-family: var(--font-main);
      color: var(--c-content);
      transition: all 200ms ease;
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 6%), transparent),
        inset 0 2px 4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 6%), transparent);
    }

    .input-field::placeholder {
      color: var(--c-content-soft);
    }

    .input-field:focus {
      outline: none;
      box-shadow:
        inset 0 0 0 2px color-mix(in srgb, var(--c-action) 50%, transparent),
        inset 0 2px 4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 4%), transparent),
        0 0 0 4px color-mix(in srgb, var(--c-action) 15%, transparent);
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--c-action) 0%, color-mix(in srgb, var(--c-action) 80%, var(--c-danger)) 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-bounce);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, var(--c-light) 25%, transparent),
        0 4px 12px color-mix(in srgb, var(--c-action) 35%, transparent);
    }

    .btn-icon:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, var(--c-light) 30%, transparent),
        0 8px 20px color-mix(in srgb, var(--c-action) 45%, transparent);
    }

    .btn-icon:active {
      transform: scale(0.95);
    }

    /* === SITES SECTION === */
    .sites-section {
      padding: 14px 16px;
    }

    .sites-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .sites-count {
      font-size: 11px;
      color: var(--c-action);
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
      background-color: color-mix(in srgb, var(--c-action) 12%, transparent);
    }

    .sites-list {
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 4px;
    }

    .site-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background-color: color-mix(in srgb, var(--c-glass) 10%, transparent);
      border-radius: 12px;
      transition: all 200ms ease;
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 5%), transparent),
        inset 0 1px 0 color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 20%), transparent);
      animation: slideIn 300ms ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .site-item:hover {
      background-color: color-mix(in srgb, var(--c-glass) 18%, transparent);
      transform: translateX(4px);
    }

    .site-item-name {
      font-size: 13px;
      color: var(--c-content);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .site-item-name::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--c-danger);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--c-danger);
    }

    .btn-remove {
      background: transparent;
      border: none;
      color: var(--c-content-soft);
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: all 150ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-remove svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2.5;
      fill: none;
    }

    .btn-remove:hover {
      background-color: color-mix(in srgb, var(--c-danger) 15%, transparent);
      color: var(--c-danger);
    }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: var(--c-content-soft);
      font-size: 13px;
      background-color: color-mix(in srgb, var(--c-glass) 8%, transparent);
      border-radius: 12px;
      border: 1px dashed color-mix(in srgb, var(--c-glass) 30%, transparent);
    }

    .empty-state-icon {
      font-size: 28px;
      margin-bottom: 8px;
      opacity: 0.6;
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--c-glass) 40%, transparent);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--c-action);
    }

    /* === TOGGLE === */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--c-content-soft);
      font-weight: 600;
    }

    .toggle-label svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background-color: color-mix(in srgb, var(--c-glass) 25%, transparent);
      border-radius: 99px;
      transition: background-color 200ms ease;
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 6%), transparent),
        inset 0 2px 4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: var(--c-content-soft);
      border-radius: 50%;
      transition: all 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 1px 3px color-mix(in srgb, var(--c-dark) 20%, transparent);
    }

    .toggle-switch input:checked + .toggle-track {
      background: linear-gradient(135deg, var(--c-action) 0%, color-mix(in srgb, var(--c-action) 80%, var(--c-danger)) 100%);
    }

    .toggle-switch input:checked + .toggle-track::after {
      transform: translateX(20px);
      background: white;
    }

    /* === HARD BLOCK PER SITE === */
    .site-item.hard-blocked {
      background-color: color-mix(in srgb, var(--c-danger) 8%, transparent);
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-danger) 20%, transparent),
        inset 0 1px 0 color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 20%), transparent);
    }

    .site-item.hard-blocked .site-item-name::before {
      background: var(--c-danger);
      box-shadow: 0 0 6px var(--c-danger);
    }

    .btn-lock {
      background: transparent;
      border: none;
      color: var(--c-content-soft);
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: all 150ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-lock svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2.5;
      fill: none;
    }

    .btn-lock:hover {
      background-color: color-mix(in srgb, var(--c-danger) 15%, transparent);
      color: var(--c-danger);
    }

    .btn-lock.active {
      color: var(--c-danger);
    }

    /* === SITE FEATURES === */
    .site-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .site-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 12px;
      border: none;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-main);
      color: var(--c-content-soft);
      background-color: color-mix(in srgb, var(--c-glass) 12%, transparent);
      transition: all 200ms ease;
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 6%), transparent),
        inset 0 1px 0 color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 25%), transparent);
    }

    .site-tab svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .site-tab:hover {
      color: var(--c-content);
      background-color: color-mix(in srgb, var(--c-glass) 20%, transparent);
      transform: translateY(-1px);
    }

    .site-tab.active[data-site="youtube"] {
      color: white;
      background: linear-gradient(135deg, #ff0000, #cc0000);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 4px 12px rgba(255, 0, 0, 0.35);
    }

    .site-tab.active[data-site="instagram"] {
      color: white;
      background: linear-gradient(135deg, #f09433 0%, #e6683c 30%, #dc2743 60%, #bc1888 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 4px 12px rgba(220, 39, 67, 0.35);
    }

    .site-panel {
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    .site-panel.active {
      display: flex;
    }

    .site-feature-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      background-color: color-mix(in srgb, var(--c-glass) 10%, transparent);
      border-radius: 12px;
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 5%), transparent),
        inset 0 1px 0 color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 20%), transparent);
    }

    .site-feature-item span {
      font-size: 12px;
      color: var(--c-content);
      font-weight: 500;
    }

    /* === FOOTER === */
    .footer {
      text-align: center;
      padding: 8px 16px 16px;
      color: var(--c-content-soft);
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .footer-link {
      color: var(--c-action);
      text-decoration: none;
      font-weight: 600;
      transition: color 200ms ease;
    }

    .footer-link:hover {
      color: var(--c-action-hover);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header glass-card">
      <div class="header-left">
        <div class="header-icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>Navegação Consciente</h1>
        </div>
      </div>
      <div class="theme-switcher">
        <button class="theme-btn active" data-theme="light" title="Light">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="theme-btn" data-theme="dark" title="Dark">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="theme-btn" data-theme="dim" title="Dim">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="config-section glass-card">
      <p class="config-label">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Tempo de espera
      </p>
      <div class="timer-grid">
        <button class="timer-btn" data-time="3">3s</button>
        <button class="timer-btn" data-time="5">5s</button>
        <button class="timer-btn active" data-time="10">10s</button>
        <button class="timer-btn" data-time="15">15s</button>
        <button class="timer-btn" data-time="30">30s</button>
      </div>
    </section>

    <section class="config-section glass-card">
      <p class="config-label">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Alerta de tempo
      </p>
      <div class="timer-grid">
        <button class="alert-btn" data-alert="1">1m</button>
        <button class="alert-btn" data-alert="5">5m</button>
        <button class="alert-btn active" data-alert="10">10m</button>
        <button class="alert-btn" data-alert="30">30m</button>
        <button class="alert-btn" data-alert="0">Off</button>
      </div>
    </section>

    <section class="toggle-row glass-card">
      <span class="toggle-label">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Cronômetro flutuante
      </span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-cronometro" checked>
        <span class="toggle-track"></span>
      </label>
    </section>

    <section class="config-section glass-card">
      <p class="config-label">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Adicionar site
      </p>
      <div class="input-group">
        <input type="text" class="input-field" id="site-input" placeholder="youtube.com">
        <button class="btn-icon" id="btn-add">+</button>
      </div>
    </section>

    <section class="sites-section glass-card">
      <div class="sites-header">
        <span class="config-label">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
          </svg>
          Blocklist
        </span>
        <span class="sites-count" id="sites-count">0 sites</span>
      </div>
      <div class="sites-list" id="sites-container">
        <div class="empty-state">
          <div class="empty-state-icon">🎯</div>
          Nenhum site bloqueado.<br>
          Adicione para navegar com consciência.
        </div>
      </div>
    </section>

    <section class="config-section glass-card">
      <p class="config-label">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        Funcionalidades específicas
      </p>
      <div class="site-tabs">
        <button class="site-tab active" data-site="youtube">
          <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.5 15.6V8.4L15.8 12l-6.3 3.6z"/></svg>
          YouTube
        </button>
        <button class="site-tab" data-site="instagram">
          <svg viewBox="0 0 24 24"><path d="M12 2.2c3.2 0 3.6 0 4.9.1 3.3.1 4.8 1.7 4.9 4.9.1 1.3.1 1.6.1 4.8s0 3.6-.1 4.8c-.1 3.2-1.6 4.8-4.9 4.9-1.3.1-1.6.1-4.9.1s-3.6 0-4.8-.1C3.9 21.5 2.4 20 2.3 16.8 2.2 15.6 2.2 15.2 2.2 12s0-3.6.1-4.8C2.4 3.9 3.9 2.4 7.2 2.3c1.2-.1 1.6-.1 4.8-.1zM12 0C8.7 0 8.3 0 7.1.1 2.7.3.3 2.7.1 7.1 0 8.3 0 8.7 0 12s0 3.7.1 4.9c.2 4.4 2.6 6.8 7 7C8.3 24 8.7 24 12 24s3.7 0 4.9-.1c4.4-.2 6.8-2.6 7-7C24 15.7 24 15.3 24 12s0-3.7-.1-4.9c-.2-4.4-2.6-6.8-7-7C15.7 0 15.3 0 12 0zm0 5.8a6.2 6.2 0 1 0 0 12.4A6.2 6.2 0 0 0 12 5.8zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.4-11.8a1.4 1.4 0 1 0 0 2.9 1.4 1.4 0 0 0 0-2.9z"/></svg>
          Instagram
        </button>
      </div>

      <div class="site-panel active" id="panel-youtube">
        <div class="site-feature-item">
          <span>Ocultar controle de velocidade</span>
          <label class="toggle-switch">
            <input type="checkbox" id="feat-youtube-speed">
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

      <div class="site-panel" id="panel-instagram">
        <div class="site-feature-item">
          <span>Ocultar Reels na navegação</span>
          <label class="toggle-switch">
            <input type="checkbox" id="feat-instagram-reels">
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>
    </section>

    <footer class="footer">
      Feito por <a href="https://www.ygorandrade.work/" target="_blank" class="footer-link">Ygor Andrade</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
